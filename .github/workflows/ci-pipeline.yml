name: CI Pipeline

on:
  push:
    branches:
      - main
      - "feature/**"
      - "fix/**"
    paths:
      - "pipeline/**"
      - "pyproject.toml"
      - "uv.lock"
      - "pipeline/dockerfile"
      - ".dockerignore"
      - ".github/workflows/ci-pipeline.yml"

  pull_request:
    branches:
      - main
    paths:
      - "pipeline/**"
      - "pyproject.toml"
      - "uv.lock"
      - "pipeline/dockerfile"
      - ".dockerignore"
      - ".github/workflows/ci-pipeline.yml"

jobs:
  pipeline-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --frozen

      - name: Check Python syntax
        run: uv run python -m compileall pipeline

      - name: Check pipeline import
        env:
          GCP_PROJECT_ID: dummy-project
          EDINET_API_KEY_SECRET_NAME: dummy-secret
          GCS_BUCKET_NAME: dummy-bucket
        run: uv run python -c "import pipeline.main; print('Pipeline import OK')"

      - name: Run tests
        run: uv run pytest tests/pipeline/

      - name: Build Docker image
        run: |
          docker build \
            -f pipeline/dockerfile \
            -t edinet-pipeline-ci-test:${{ github.sha }} \
            .

      - name: Check config import inside Docker
        run: |
          docker run --rm \
            -e GCP_PROJECT_ID=dummy-project \
            -e EDINET_API_KEY_SECRET_NAME=dummy-secret \
            -e GCS_BUCKET_NAME=dummy-bucket \
            edinet-pipeline-ci-test:${{ github.sha }} \
            uv run python -c "from core.config import get_api_key, URL_DOWNLOAD, BUCKET_NAME; print('Docker config import OK')"