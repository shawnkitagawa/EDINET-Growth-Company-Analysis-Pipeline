name: CD Pipeline

on:
  push:
    branches:
      - main
    paths:
      - "pipeline/**"
      - "pyproject.toml"
      - "uv.lock"
      - "Dockerfile"
      - ".dockerignore"
      - ".github/workflows/cd-pipeline.yml"

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/319854487428/locations/global/workloadIdentityPools/github-actions-pool/providers/github-actions-provider
          service_account: github-actions-deployer@edinet-growth-pipeline.iam.gserviceaccount.com

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Docker auth to Artifact Registry
        run: |
          gcloud auth configure-docker asia-northeast1-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          docker build \
            -f pipeline/dockerfile \
            -t asia-northeast1-docker.pkg.dev/319854487428/edinet-repo/edinet-pipeline:${{ github.sha }} \
            .

      - name: Push Docker image
        run: |
          docker push asia-northeast1-docker.pkg.dev/319854487428/edinet-repo/edinet-pipeline:${{ github.sha }}

      - name: Update Cloud Run Job
        run: |
          gcloud run jobs update edinet-pipeline-job \
            --image asia-northeast1-docker.pkg.dev/319854487428/edinet-repo/edinet-pipeline:${{ github.sha }} \
            --region asia-northeast1